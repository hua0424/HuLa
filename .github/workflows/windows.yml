name: Build Windows App

on:
  push:
    branches:
      - dev_build_msi
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable updater signing
        run: |
          $json = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $json.bundle.createUpdaterArtifacts = $false
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build Windows App
        run: pnpm tauri build --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: hula-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: hula-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
